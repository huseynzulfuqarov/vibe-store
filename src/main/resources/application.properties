spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
server.port=8080

spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.default_batch_fetch_size=20

spring.ai.google.genai.api-key=${GEMINI_API_KEY}
spring.ai.google.genai.chat.options.model=gemini-2.5-flash

logging.level.org.springframework.ai=DEBUG

spring.ai.embedding.transformer.onnx.model-uri=https://huggingface.co/Xenova/paraphrase-multilingual-MiniLM-L12-v2/resolve/main/onnx/model.onnx
spring.ai.embedding.transformer.tokenizer.uri=https://huggingface.co/Xenova/paraphrase-multilingual-MiniLM-L12-v2/resolve/main/tokenizer.json

logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] [%X{traceId}] %-5level %logger{36} - %msg%n
logging.level.root=INFO
logging.level.com.example.vibe_store=DEBUG

jwt.secret=${JWT_SECRET:myVerySecretKeyThatIsAtLeast256BitsLong12345}
jwt.access-token-expiration=900000
jwt.refresh-token-expiration=604800000
jwt.issuer=vibe-store

google.client-id=${GOOGLE_CLIENT_ID}

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# Resilience4j
resilience4j.circuitbreaker.instances.aiService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.aiService.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.aiService.slidingWindowSize=10
resilience4j.circuitbreaker.instances.aiService.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.aiService.permittedNumberOfCallsInHalfOpenState=3

resilience4j.retry.instances.aiService.maxAttempts=3
resilience4j.retry.instances.aiService.waitDuration=1s

resilience4j.ratelimiter.instances.aiService.limitForPeriod=20
resilience4j.ratelimiter.instances.aiService.limitRefreshPeriod=1m
resilience4j.ratelimiter.instances.aiService.timeoutDuration=5s